version: "3"

# App image tag is injected via the APP_TAG environment variable
# (set by Jenkins from the upstream build, defaults to 'latest' for local runs).
# Usage: APP_TAG=42 docker-compose up -d

services:
  shopping-cart-app:
    image: shopping-cart:${APP_TAG:-latest}
    container_name: shopping-cart-app
    ports:
      - "8080:8080"
    networks:
      - test-net

  selenium-hub:
    image: selenium/hub:4.21.0
    container_name: selenium-hub
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    networks:
      - test-net

  chrome:
    image: selenium/node-chrome:4.21.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
    networks:
      - test-net

  firefox:
    image: selenium/node-firefox:4.21.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
